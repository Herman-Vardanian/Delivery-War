version: '3.8'

services:
  delivery-backend:
    build:
      context: ./backend
    container_name: delivery-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xmx512m -Xms256m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - delivery-network

  delivery-frontend:
    build:
      context: ./frontend
    container_name: delivery-frontend
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - delivery-backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - delivery-network

  delivery-db:
    image: postgres:15-alpine
    container_name: delivery-db
    environment:
      - POSTGRES_DB=delivery
      - POSTGRES_USER=delivery
      - POSTGRES_PASSWORD=delivery123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - delivery-network
    profiles:
      - postgres

volumes:
  postgres_data:

networks:
  delivery-network:
    driver: bridge

