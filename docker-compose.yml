version: '3.8'

services:
  delivery-db:
    image: postgres:15-alpine
    container_name: delivery-db
    environment:
      - POSTGRES_DB=delivery
      - POSTGRES_USER=delivery
      - POSTGRES_PASSWORD=delivery123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "delivery", "-d", "delivery"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - delivery-network

  delivery-backend:
    build:
      context: ./backend
    container_name: delivery-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_USER=delivery
      - DB_PASSWORD=delivery123
      - JAVA_OPTS=-Xmx512m -Xms256m
    restart: unless-stopped
    depends_on:
      delivery-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - delivery-network

  delivery-frontend:
    build:
      context: ./frontend
    container_name: delivery-frontend
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - delivery-backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - delivery-network

volumes:
  postgres_data:

networks:
  delivery-network:
    driver: bridge
