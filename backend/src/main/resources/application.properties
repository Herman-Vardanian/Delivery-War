## H2 (file-based) datasource configuration for development
spring.datasource.url=jdbc:h2:file:./data/deliverydb;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

## JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

## H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Keep datasource initialization deferred to let JPA bootstrap first when needed
spring.jpa.defer-datasource-initialization=true
